<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شاهين إكسبريس | لوحة تتبع المناديب 🦅</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{ --gold:#d4af37; --purple:#1a051a; --card:#241026; --green:#2ecc71; --orange:#e67e22; --red:#e74c3c; }
  *{box-sizing:border-box;}
  html, body{margin:0; font-family:'Segoe UI', Tahoma, sans-serif; background:var(--purple); color:#fff;
    width:100%; height:100%; overflow:hidden; display:flex; flex-direction:column;}
  #topbar{
    flex:0 0 auto; display:flex; align-items:center; gap:14px; padding:8px 16px; flex-wrap:wrap;
    background:linear-gradient(90deg,#2b0a2b,#3a0f1a); border-bottom:2px solid var(--gold);
  }
  #topbar h1{ font-size:14px; color:var(--gold); margin:0; flex:0 0 auto; }
  #conn-status{ font-size:11px; padding:4px 10px; border-radius:20px; white-space:nowrap; }
  .conn-ok{ background:rgba(46,204,113,0.15); color:var(--green); border:1px solid var(--green); }
  .conn-bad{ background:rgba(231,76,60,0.15); color:var(--red); border:1px solid var(--red); }
  #stats-bar{ display:flex; gap:8px; margin-right:auto; font-size:11px; flex-wrap:wrap; }
  .stat-chip{ background:rgba(212,175,55,0.1); border:1px solid rgba(212,175,55,0.3); padding:3px 9px; border-radius:20px; white-space:nowrap; }
  #refresh-btn{ background:var(--gold); color:#1a051a; border:none; padding:6px 14px; border-radius:20px; font-weight:bold; cursor:pointer; font-size:12px; white-space:nowrap; }
  #refresh-btn:active{ transform:scale(0.96); }

  #layout{ flex:1 1 auto; display:flex; min-height:0; overflow:hidden; }
  #map{ flex:1 1 auto; min-width:0; min-height:0; }
  #side{ width:340px; flex:0 0 340px; background:var(--card); border-right:1px solid rgba(212,175,55,0.25);
    overflow-y:auto; display:flex; flex-direction:column; min-height:0; }

  /* شاشات الموبايل: الخريطة فوق، القائمة تحتها بدل عمود ثابت العرض */
  @media (max-width: 760px) {
    #layout{ flex-direction:column; }
    #map{ flex:1 1 50%; }
    #side{ width:100%; flex:1 1 50%; border-right:none; border-top:1px solid rgba(212,175,55,0.25); }
  }

  #alerts-host{ padding:8px; display:flex; flex-direction:column; gap:6px; max-height:160px; overflow-y:auto; border-bottom:1px solid rgba(212,175,55,0.2); }
  .alert-row{ padding:7px 10px; border-radius:7px; font-size:11.5px; display:flex; justify-content:space-between; align-items:center; animation:slideIn .2s ease; }
  @keyframes slideIn{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }

  #driver-list{ padding:8px; flex:1; overflow-y:auto; }
  .driver-card{
    background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.15); border-radius:10px;
    padding:9px 11px; margin-bottom:7px; cursor:pointer; transition:.15s;
  }
  .driver-card:hover{ background:rgba(212,175,55,0.08); }
  .driver-card.selected{ border-color:var(--gold); background:rgba(212,175,55,0.12); }
  .dc-top{ display:flex; justify-content:space-between; align-items:center; }
  .dc-name{ font-weight:bold; font-size:13px; }
  .dc-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-left:6px; }
  .dc-meta{ font-size:10.5px; color:#999; margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }

  #detail-panel{ border-top:1px solid rgba(212,175,55,0.25); padding:12px; font-size:12px; display:none; }
  #detail-panel h4{ margin:0 0 6px; color:var(--gold); font-size:13.5px; }
  #detail-panel .row{ display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.05); }

  #empty-state{ text-align:center; color:#888; font-size:12px; padding:30px 14px; line-height:1.8; }
  #empty-state b{ color:var(--gold); }

  #raw-toggle{ font-size:10.5px; color:#888; text-align:center; padding:6px; cursor:pointer; border-top:1px solid rgba(255,255,255,0.06); }
  #raw-table-wrap{ display:none; padding:8px; max-height:200px; overflow:auto; font-size:10px; }
  #raw-table-wrap table{ width:100%; border-collapse:collapse; }
  #raw-table-wrap td, #raw-table-wrap th{ padding:4px 6px; border-bottom:1px solid rgba(255,255,255,0.08); text-align:right; white-space:nowrap; }
  #raw-table-wrap th{ color:var(--gold); }

  .leaflet-popup-content-wrapper{ background:#241026; color:#fff; border:1px solid var(--gold); }
  .leaflet-popup-tip{ background:#241026; }
</style>
</head>
<body>

  <div id="topbar">
    <h1>🦅 لوحة تتبع المناديب — شاهين إكسبريس</h1>
    <span id="conn-status" class="conn-bad">جاري الاتصال...</span>
    <div id="stats-bar">
      <span class="stat-chip">🟢 متحرك: <b id="cnt-moving">0</b></span>
      <span class="stat-chip">🟠 متوقف: <b id="cnt-stopped">0</b></span>
      <span class="stat-chip">⚪ غير متصل: <b id="cnt-offline">0</b></span>
      <span class="stat-chip">آخر تحديث: <span id="last-refresh">--</span></span>
    </div>
    <button id="refresh-btn" onclick="manualRefresh()">🔄 تحديث الآن</button>
  </div>

  <div id="layout">
    <div id="map"></div>
    <div id="side">
      <div id="alerts-host"></div>
      <div id="driver-list">
        <div id="empty-state">جاري تحميل بيانات المناديب...</div>
      </div>
      <div id="detail-panel"></div>
      <div id="raw-toggle" onclick="toggleRaw()">عرض البيانات الخام (للتشخيص) ⌄</div>
      <div id="raw-table-wrap"></div>
    </div>
  </div>

<script>
  // =====================================================================
  // إعدادات الاتصال — نفس بيانات الاتصال المستخدمة في باقي تطبيقات شاهين إكسبريس
  // =====================================================================
  const SB_URL = "https://ricoslplbhphydhtrufe.supabase.co";
  const SB_KEY = "sb_publishable_k6LgEuwPLdCsBMCFC12wfQ_BSOJotuw";
  const client = supabase.createClient(SB_URL, SB_KEY);

  const LIVE_TABLE = 'tracking_live';
  const PATH_TABLE = 'tracking_path';
  const ALERTS_TABLE = 'tracking_alerts';
  const ZONE = { name: 'حماه', lat: 35.1318, lng: 36.7578, radiusKm: 25 };
  const STALE_SEC = 60, STOPPED_MIN = 6, ALERT_COOLDOWN_MS = 3 * 60 * 1000;

  let map, driversData = {}, markers = {}, pathLine = null, selectedDriverId = null;
  const lastAlertAt = {};

  // ----- تهيئة الخريطة -----
  function initMap() {
    map = L.map('map', { attributionControl: true }).setView([ZONE.lat, ZONE.lng], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      subdomains: ['a', 'b', 'c'],
      attribution: '© OpenStreetMap'
    }).addTo(map);
    L.circle([ZONE.lat, ZONE.lng], { radius: ZONE.radiusKm * 1000, color: '#d4af37', weight: 1, fillOpacity: 0.03, dashArray: '6,6' })
      .addTo(map).bindTooltip('نطاق العمل: ' + ZONE.name);
    window.addEventListener('resize', () => map.invalidateSize());
    setTimeout(() => map.invalidateSize(), 300);
  }

  function km(lat1, lng1, lat2, lng2) {
    const R = 6371, toRad = Math.PI / 180;
    const dLat = (lat2 - lat1) * toRad, dLng = (lng2 - lng1) * toRad;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * toRad) * Math.cos(lat2 * toRad) * Math.sin(dLng / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function timeAgo(iso) {
    if (!iso) return 'لا يوجد';
    const sec = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (sec < 60) return `منذ ${sec} ثانية`;
    if (sec < 3600) return `منذ ${Math.floor(sec/60)} دقيقة`;
    return `منذ ${Math.floor(sec/3600)} ساعة`;
  }

  function statusOf(row) {
    if (!row.updated_at) return 'offline';
    const gapSec = (Date.now() - new Date(row.updated_at).getTime()) / 1000;
    if (row.status !== 'online' || gapSec > STALE_SEC) return 'offline';
    return row.is_moving ? 'moving' : 'stopped';
  }
  function statusColor(s) { return { moving: '#2ecc71', stopped: '#e67e22', offline: '#888' }[s]; }
  function statusLabel(s) { return { moving: '🟢 متحرك', stopped: '🟠 متوقف', offline: '⚪ غير متصل' }[s]; }

  function driverIcon(color) {
    return L.divIcon({ className:'', html:`<div style="font-size:22px; filter:drop-shadow(0 0 4px ${color});">🦅</div>`, iconSize:[26,26], iconAnchor:[13,13] });
  }

  // =====================================================================
  // عرض/تحديث البيانات
  // =====================================================================
  function setConnStatus(ok, msg) {
    const el = document.getElementById('conn-status');
    el.className = ok ? 'conn-ok' : 'conn-bad';
    el.innerText = msg;
  }

  function renderAll() {
    const rows = Object.values(driversData);
    document.getElementById('last-refresh').innerText = new Date().toLocaleTimeString('ar-SY');

    let moving = 0, stopped = 0, offline = 0;
    const listEl = document.getElementById('driver-list');
    if (!rows.length) {
      listEl.innerHTML = `<div id="empty-state">
        <b>لا يوجد أي مندوب بجدول التتبع حالياً.</b><br><br>
        هذا يعني أحد شيئين:<br>
        1) لا يوجد مندوب شغّال التطبيق الآن، أو<br>
        2) كود إرسال الموقع بتطبيق المندوب لم يُفعَّل بعد على الجهاز.<br><br>
        افتح "عرض البيانات الخام" بالأسفل للتأكد من حالة الجدول مباشرة.
      </div>`;
    } else {
      listEl.innerHTML = '';
    }

    rows.sort((a,b) => (a.driver_name||'').localeCompare(b.driver_name||''));
    rows.forEach(row => {
      const s = statusOf(row);
      if (s === 'moving') moving++; else if (s === 'stopped') stopped++; else offline++;

      // ----- ماركر الخريطة -----
      if (row.lat && row.lng) {
        if (!markers[row.driver_id]) {
          markers[row.driver_id] = L.marker([row.lat, row.lng], { icon: driverIcon(statusColor(s)) })
            .addTo(map).on('click', () => selectDriver(row.driver_id));
        } else {
          markers[row.driver_id].setLatLng([row.lat, row.lng]);
          markers[row.driver_id].setIcon(driverIcon(statusColor(s)));
        }
        markers[row.driver_id].bindTooltip(`${row.driver_name||'مندوب'} — ${statusLabel(s)}`);
      } else if (markers[row.driver_id]) {
        map.removeLayer(markers[row.driver_id]); delete markers[row.driver_id];
      }

      // ----- بطاقة بالقائمة الجانبية -----
      const card = document.createElement('div');
      card.className = 'driver-card' + (selectedDriverId === row.driver_id ? ' selected' : '');
      card.onclick = () => selectDriver(row.driver_id);
      card.innerHTML = `
        <div class="dc-top">
          <span class="dc-name"><span class="dc-dot" style="background:${statusColor(s)}"></span>${row.driver_name || 'مندوب #' + row.driver_id}</span>
          <span style="font-size:10px; color:#999;">${timeAgo(row.updated_at)}</span>
        </div>
        <div class="dc-meta">
          <span>${statusLabel(s)}</span>
          ${row.order_id ? `<span>📦 طلب #${row.order_id}</span>` : '<span>لا يوجد طلب</span>'}
          ${row.speed ? `<span>${Math.round(row.speed*3.6)} كم/س</span>` : ''}
          ${row.fake_gps ? '<span style="color:#e74c3c;">⚠️ GPS مشبوه</span>' : ''}
        </div>`;
      listEl.appendChild(card);

      evaluateAlerts(row, s);
    });

    document.getElementById('cnt-moving').innerText = moving;
    document.getElementById('cnt-stopped').innerText = stopped;
    document.getElementById('cnt-offline').innerText = offline;

    renderRawTable(rows);
    if (selectedDriverId && driversData[selectedDriverId]) renderDetail(driversData[selectedDriverId]);
  }

  function selectDriver(id) {
    selectedDriverId = id;
    renderAll();
    const row = driversData[id];
    if (row && row.lat && row.lng) map.setView([row.lat, row.lng], 15);
    renderDetail(row);
    loadPath(row);
  }

  function renderDetail(row) {
    const panel = document.getElementById('detail-panel');
    if (!row) { panel.style.display = 'none'; return; }
    panel.style.display = 'block';
    const s = statusOf(row);
    panel.innerHTML = `
      <h4>${row.driver_name || 'مندوب #' + row.driver_id}</h4>
      <div class="row"><span>الحالة</span><span>${statusLabel(s)}</span></div>
      <div class="row"><span>الطلب الحالي</span><span>${row.order_id || 'لا يوجد'}</span></div>
      <div class="row"><span>السرعة</span><span>${Math.round((row.speed||0)*3.6)} كم/س</span></div>
      <div class="row"><span>دقة GPS</span><span>${Math.round(row.accuracy||0)} م</span></div>
      <div class="row"><span>البطارية</span><span>${row.battery != null ? row.battery + '%' : '—'}</span></div>
      <div class="row"><span>وضع التطبيق</span><span>${row.app_state === 'background' ? '🌙 خلفية' : '☀️ مفتوح'}</span></div>
      <div class="row"><span>آخر تحديث</span><span>${timeAgo(row.updated_at)}</span></div>
      ${row.fake_gps ? '<div class="row" style="color:#e74c3c;"><span>تنبيه</span><span>⚠️ اشتباه GPS غير حقيقي</span></div>' : ''}
    `;
  }

  async function loadPath(row) {
    if (pathLine) { try { map.removeLayer(pathLine); } catch(e){} pathLine = null; }
    if (!row || !row.order_id) return;
    try {
      const { data, error } = await client.from(PATH_TABLE).select('lat,lng').eq('order_id', String(row.order_id)).order('created_at', { ascending: true });
      if (error) { console.warn('loadPath error', error); return; }
      if (data && data.length > 1) {
        pathLine = L.polyline(data.map(p => [p.lat, p.lng]), { color: '#d4af37', weight: 4, opacity: 0.85 }).addTo(map);
      }
    } catch (e) { console.warn(e); }
  }

  // =====================================================================
  // التنبيهات الاستباقية
  // =====================================================================
  function canFire(driverId, type) {
    const key = driverId+':'+type, now = Date.now();
    if (lastAlertAt[key] && now - lastAlertAt[key] < ALERT_COOLDOWN_MS) return false;
    lastAlertAt[key] = now; return true;
  }
  function alertColor(t){ return {offline:'#e74c3c', stopped_too_long:'#e67e22', out_of_zone:'#8e44ad', fake_gps:'#c0392b'}[t]||'#e74c3c'; }
  function alertIcon(t){ return {offline:'📡', stopped_too_long:'⏸️', out_of_zone:'📍', fake_gps:'⚠️'}[t]||'⚠️'; }

  function fireAlert(row, type, message) {
    if (!canFire(row.driver_id, type)) return;
    const host = document.getElementById('alerts-host');
    const div = document.createElement('div');
    div.className = 'alert-row';
    div.style.background = alertColor(type); div.style.color = '#fff';
    div.innerHTML = `<span>${alertIcon(type)} ${message}</span><span onclick="this.parentElement.remove()" style="cursor:pointer;">✕</span>`;
    host.insertBefore(div, host.firstChild);
    while (host.children.length > 12) host.removeChild(host.lastChild);
    try { client.from(ALERTS_TABLE).insert({ driver_id: row.driver_id, driver_name: row.driver_name, order_id: row.order_id, alert_type: type, message }); } catch(e){}
  }

  function evaluateAlerts(row, s) {
    if (s === 'offline' && row.status === 'online') {
      const gapSec = row.updated_at ? (Date.now() - new Date(row.updated_at).getTime())/1000 : 9999;
      fireAlert(row, 'offline', `${row.driver_name}: لا تحديث موقع منذ ${Math.round(gapSec)} ثانية`);
    }
    if (row.order_id && row.is_moving === false && row.stopped_since) {
      const stoppedMin = (Date.now() - new Date(row.stopped_since).getTime())/60000;
      if (stoppedMin >= STOPPED_MIN) fireAlert(row, 'stopped_too_long', `${row.driver_name}: متوقف منذ ${Math.round(stoppedMin)} دقيقة على طلب نشط`);
    }
    if (row.lat && row.lng && row.status === 'online' && km(row.lat,row.lng,ZONE.lat,ZONE.lng) > ZONE.radiusKm) {
      fireAlert(row, 'out_of_zone', `${row.driver_name}: خارج نطاق العمل (${ZONE.name})`);
    }
    if (row.fake_gps) fireAlert(row, 'fake_gps', `${row.driver_name}: اشتباه GPS غير حقيقي`);
  }

  // =====================================================================
  // جدول البيانات الخام (تشخيص مباشر)
  // =====================================================================
  function toggleRaw() {
    const el = document.getElementById('raw-table-wrap');
    el.style.display = el.style.display === 'none' ? 'block' : 'none';
  }
  function renderRawTable(rows) {
    const wrap = document.getElementById('raw-table-wrap');
    if (!rows.length) { wrap.innerHTML = '<p style="color:#888; text-align:center;">الجدول tracking_live فاضي تماماً حالياً.</p>'; return; }
    let html = '<table><tr><th>المندوب</th><th>الحالة</th><th>lat</th><th>lng</th><th>آخر تحديث</th><th>طلب</th></tr>';
    rows.forEach(r => {
      html += `<tr><td>${r.driver_name||r.driver_id}</td><td>${r.status}</td><td>${r.lat||'—'}</td><td>${r.lng||'—'}</td><td>${r.updated_at||'—'}</td><td>${r.order_id||'—'}</td></tr>`;
    });
    html += '</table>';
    wrap.innerHTML = html;
  }

  // =====================================================================
  // التحميل + Realtime + احتياط Polling
  // =====================================================================
  async function fetchAll() {
    try {
      const { data, error } = await client.from(LIVE_TABLE).select('*');
      if (error) {
        setConnStatus(false, 'خطأ بقاعدة البيانات: ' + error.message);
        console.error('Supabase error:', error);
        return;
      }
      setConnStatus(true, 'متصل ✅ (' + (data?.length||0) + ' مندوب بالجدول)');
      driversData = {};
      (data || []).forEach(r => driversData[r.driver_id] = r);
      renderAll();
    } catch (e) {
      setConnStatus(false, 'فشل الاتصال: ' + e.message);
      console.error(e);
    }
  }

  function manualRefresh() { fetchAll(); }

  function startRealtime() {
    client.channel('standalone-tracking-dashboard')
      .on('postgres_changes', { event: '*', schema: 'public', table: LIVE_TABLE }, payload => {
        if (payload.eventType === 'DELETE') {
          delete driversData[payload.old.driver_id];
          if (markers[payload.old.driver_id]) { map.removeLayer(markers[payload.old.driver_id]); delete markers[payload.old.driver_id]; }
        } else {
          driversData[payload.new.driver_id] = payload.new;
        }
        renderAll();
      })
      .subscribe((status) => {
        if (status === 'SUBSCRIPTION_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
          setConnStatus(false, 'انقطع الاتصال اللحظي Realtime — يعمل بالتحديث الدوري فقط');
        }
      });
  }

  initMap();
  fetchAll();
  startRealtime();
  setInterval(fetchAll, 10000); // احتياط دائم كل 10 ثوان حتى لو Realtime متعطّل
</script>
</body>
</html>
